name: Weekly Governance Summary

on:
  schedule:
    # Monday 07:00 AEDT (16:00 UTC Sunday)
    - cron: '0 16 * * 0'
  workflow_dispatch:

jobs:
  generate-summary:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get week start date
        id: date
        run: |
          WEEK_START=$(date -d "last Monday" +%Y-%m-%d)
          echo "week_start=$WEEK_START" >> $GITHUB_OUTPUT
          echo "week_end=$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Scan governance changes
        id: scan
        run: |
          echo "Scanning for changes since ${{ steps.date.outputs.week_start }}"

          # Find modified governance files
          git diff --name-only HEAD~7 2>/dev/null | grep -E "(risk-register|decision-log|project-brief)" || echo "No governance changes detected"

          # Create summary placeholder
          echo "governance_changes=true" >> $GITHUB_OUTPUT

      - name: Create summary markdown
        id: summary
        run: |
          cat > weekly-summary-${{ steps.date.outputs.week_start }}.md << 'EOF'
          # Weekly Governance Summary — ${{ steps.date.outputs.week_start }}

          **Period:** ${{ steps.date.outputs.week_start }} to ${{ steps.date.outputs.week_end }}

          ## 📊 Project Status Summary

          This summary aggregates changes to:
          - Risk registers across all active projects
          - Decision logs and key decisions made
          - Project status and milestone updates
          - Compliance checklist changes

          ### Active Projects

          _Details to be populated by automated scanning of projects/ folder_

          ## ⚠️ Key Risks Identified

          _Automated extraction from risk registers_

          ## 🎯 Decisions Made This Week

          _Automated extraction from decision logs_

          ## 📈 Project Progress

          _Automated project status aggregation_

          ---

          **Generated by:** SDARPP Weekly Governance Automation
          **Last updated:** ${{ steps.date.outputs.week_end }}

          _This is an automatically generated summary. Review and approve before merge._
          EOF

          ls -la weekly-summary-*.md

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          commit-message: "automation: generate weekly governance summary for ${{ steps.date.outputs.week_start }}"
          title: "📋 Weekly Governance Summary — ${{ steps.date.outputs.week_start }}"
          body: |
            ## Automated Weekly Governance Summary

            This PR contains the aggregated governance summary for the week of **${{ steps.date.outputs.week_start }}**.

            ### What This Includes
            - Risk register updates across all projects
            - Decision log entries
            - Project status changes
            - Compliance drift detection results

            ### Review Checklist
            - [ ] All projects represented
            - [ ] No stale information
            - [ ] Risks accurately captured
            - [ ] Decisions clearly documented

            **Merge to main only after human review.**
          branch: automation/weekly-summary-${{ steps.date.outputs.week_start }}
          delete-branch: true
